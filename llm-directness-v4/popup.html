<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px 0;
      color: #0f0;
      font-family: monospace;
    }
    .section {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .section:last-child {
      border-bottom: none;
    }
    .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
      text-align: left;
    }
    button:hover {
      background: #333;
      border-color: #666;
    }
    button.primary {
      background: #1a4a1a;
      border-color: #0a0;
    }
    button.primary:hover {
      background: #1a5a1a;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-row label {
      font-size: 13px;
    }
    .status {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      font-family: monospace;
    }
    .warn {
      background: #2a1a0a;
      border: 1px solid #a60;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #fa0;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>LLM-DIRECT v4</h1>

  <div class="section">
    <div class="label">CONFIGURAR INSTRUCCIONES DEL SISTEMA</div>
    <button id="btn-chatgpt" class="primary">📝 Setup ChatGPT Custom Instructions</button>
    <button id="btn-gemini" class="primary">📝 Setup Gemini Gem</button>
    <div class="warn">
      Abrirá una pestaña visible. Verifica que se guardó correctamente antes de cerrar.
    </div>
  </div>

  <div class="section">
    <div class="label">INYECCIÓN EN CHAT (DeepSeek, Perplexity, etc.)</div>
    <div class="toggle-row">
      <label for="toggle">Inyección automática activa</label>
      <input type="checkbox" id="toggle" checked>
    </div>
    <div class="status" id="status">Estado: cargando...</div>
  </div>

  <div class="section">
    <div class="label">CLAUDE</div>
    <button id="btn-claude">📋 Copiar directiva para Claude</button>
    <div class="warn">
      Claude no permite autofill. Pega en: Configuración → Personalización (o crea un Project).
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
